name: Publish Docker image

on:
  push:
    tags:
      - "v*"
  schedule:
    - cron: "0 3 * * 1"  # Weekly Monday 03:00 UTC — picks up new PDFBox releases
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - variant: standard
            jpeg2000: "false"
            tag_suffix: ""
          - variant: jpeg2000
            jpeg2000: "true"
            tag_suffix: "-jpeg2000"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: secrets.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image list
        id: images
        run: |
          IMAGES="ghcr.io/${{ github.repository }}"
          if [ -n "$DOCKERHUB_TOKEN" ] && [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "ERROR: DOCKERHUB_TOKEN is set but DOCKERHUB_USERNAME variable is not. Set the DOCKERHUB_USERNAME repository variable, or remove the DOCKERHUB_TOKEN secret." >&2
            exit 1
          fi
          if [ -n "$DOCKERHUB_TOKEN" ] && [ -n "$DOCKERHUB_USERNAME" ]; then
            IMAGES="$IMAGES"$'\n'"docker.io/$DOCKERHUB_USERNAME/pdfbox"
          fi
          {
            echo "list<<EOF"
            echo "$IMAGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get current PDFBox version
        id: pdfbox
        if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          version=$(curl -s "https://repo1.maven.org/maven2/org/apache/pdfbox/pdfbox/maven-metadata.xml" \
            | awk -F'[<>]' '/<version>3\./{print $3}' | sort -V | tail -1)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "minor=${version%.*}" >> "$GITHUB_OUTPUT"
          echo "major=${version%%.*}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.images.outputs.list }}
          flavor: |
            suffix=${{ matrix.tag_suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=raw,value=${{ steps.pdfbox.outputs.version }},enable=${{ steps.pdfbox.outputs.version != '' }}
            type=raw,value=${{ steps.pdfbox.outputs.minor }},enable=${{ steps.pdfbox.outputs.minor != '' }}
            type=raw,value=${{ steps.pdfbox.outputs.major }},enable=${{ steps.pdfbox.outputs.major != '' }}

      - name: Verify tags were generated
        run: |
          if [ -z "$DOCKER_TAGS" ]; then
            echo "ERROR: No Docker tags generated. On tag push, ref must be valid semver (e.g. v1.2.3)."
            exit 1
          fi
        env:
          DOCKER_TAGS: ${{ steps.meta.outputs.tags }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            JPEG2000=${{ matrix.jpeg2000 }}
