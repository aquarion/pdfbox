name: Publish Docker image

on:
  push:
    tags:
      - "v*"
  schedule:
    - cron: "0 3 * * 1"  # Weekly Monday 03:00 UTC — picks up new PDFBox releases
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

      - name: Verify tags were generated
        run: |
          if [ -z "$DOCKER_TAGS" ]; then
            echo "ERROR: No Docker tags generated. On tag push, ref must be valid semver (e.g. v1.2.3)."
            exit 1
          fi
        env:
          DOCKER_TAGS: ${{ steps.meta.outputs.tags }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
