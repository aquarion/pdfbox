name: Check signing key expiry

on:
  push:
  pull_request:
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-keys:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y --no-install-recommends gnupg curl jq

      - name: Check signing key expiry
        run: bash bin/check-keys.bash
        env:
          WARNING_DAYS: 90
